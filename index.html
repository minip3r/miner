<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <title>MINIP3R</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
  <div class="main-title">MINIP3R</div>
  <div class="sub-title">3D model (AR)</div>
</header>

<!-- Original Character -->
<div class="ar-section">
  <div class="head-title">Qynn</div>
  <div class="sub-title">original character from minip3r</div>

  <model-viewer id="model1"
    src="AR.glb"
    ios-src="AR.usdz"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    autoplay
    auto-rotate
    shadow-intensity="1"
    shadow-softness="1"
    environment-image="neutral.hdr"
    loading="eager"
    reveal="auto"
    style="width: 100%; height: 400px;">
  </model-viewer>

  <button class="ar-button" onclick="triggerAR('model1')">
    Play AR
  </button>
</div>

<footer>
  <div class="footer-link">
    <strong>Facebook:</strong>
    <a href="https://www.facebook.com" target="_blank">facebook.com</a>
  </div>
</footer>

<!-- โหลด model-viewer หลังสุด -->
<script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<script>
  function triggerAR(id) {
    const viewer = document.getElementById(id);

    if (viewer && viewer.activateAR) {
      viewer.activateAR().catch((error) => {
        alert("AR ไม่พร้อมบนอุปกรณ์นี้ หรือถูกบล็อกโดย browser\n(แนะนำให้กดปุ่ม AR บนมุมขวาของโมเดลแทน)");
        console.warn("activateAR failed:", error);
      });
    }
  }
</script>

</body>
</html>
